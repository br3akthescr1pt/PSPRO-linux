name: Build PSPRO-linux

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y wget unzip build-essential git

    - name: Download PS5 Payload SDK
      run: |
        sudo wget -O /tmp/ps5-payload-sdk.zip \
        https://github.com/ps5-payload-dev/sdk/releases/download/v0.34/ps5-payload-sdk.zip

        sudo unzip /tmp/ps5-payload-sdk.zip -d /opt

    - name: Clone PSPRO-linux
      run: |
        git clone https://github.com/br3akthescr1pt/PSPRO-linux
        cd PSPRO-linux

    - name: Build PSPRO-linux
      run: |
        cd PSPRO-linux
        export PS5_PAYLOAD_SDK=/opt/ps5-payload-sdk
        make

    - name: Upload ELF
      uses: actions/upload-artifact@v4
      with:
        name: PSPRO-linux-build
        path: PSPRO-linux/*.elf
        
